<body class="musings">

    <h1>Flags</h1>
    <hr>
    <sup class="subtitle">From <i>Emily's Brain</i></sup><br><br>

    <div>
        <figure class="center">
            <img
                src="../img/flags/bergia.png"
            >
            <figcaption><p><b>The Helmsman</b>, flag of the Most Serene Republic of Bergia. The blue symbolizes the Great Bergian Sea, the wheel is a ship's helm.</p></figcaption>
        </figure>
    </div><br>

    <div>
        <figure class="center">
            <img
                src="../img/flags/montagna.png"
            >
            <figcaption><p><b>The Red Sky</b>, flag of the Republic of Montagna. Red for the high amounts of copper in the land, the sun rises for a new dawn, mountains represent the country's geography</p></figcaption>

        </figure>
    </div><br>

    <div>
        <figure class="center">
            <img
                src="../img/flags/mancomunidad.png"
            >
            <figcaption><p><b>The White Nunón</b>, flag of Her Majesty's Mancomunidad. The épée-de-lis is the symbol for the Nunón dynasty. The white represents purity.</p></figcaption>

        </figure>
    </div><br>

    <div>
        <figure class="center">
            <img
                src="../img/flags/colonymancomunitas.png"
            >
            <figcaption><p><b>The Yellow Nunón</b>, flag of the Mancomunitas Colony. The yellow represents sand, the blue represents the river Mon.</p></figcaption>

        </figure>
    </div><br>

    <div>
        <figure class="center">
            <img
                src="../img/flags/bytar.png"
            >
            <figcaption><p><b>Purple John</b>, flag of the Commonwealth of Bytar. The six stars represent the six states that made up Bytar, the "pointed man" is an old symbol of the Bytars, and purple represents the almost-royalty status that the ruling oligarchy has. Oligarchic (government) faction of the civil war.</p></figcaption>

        </figure>
    </div><br>

    <div>
        <figure class="center">
            <img
                src="../img/flags/stateofbytar.png"
            >
            <figcaption><p><b>Black John</b>, flag of the State of Bytar. The black represents struggle. The Bytari text translates to "The Sun Rises Upon This Land." Theocratic faction of the civil war.</p></figcaption>

        </figure>
    </div><br>

    <div>
        <figure class="center">
            <img
                src="../img/flags/guerillabyrtar.png"
            >
            <figcaption><p><b>Humble John</b>, flag of the Peasant Struggle Union (or the Northern Guerillas). The red represents the blood shed by the workers. The pointed man has been given a sickle to represent the struggle for peasant liberation. Communist faction of the civil war.</p></figcaption>

        </figure>
    </div><br>

    <div>
        <figure class="center">
            <img
                src="../img/flags/konig.png"
            >
            <figcaption><p><b>Bull in Yellow</b>, flag of the Free City of König. Blue for the sky, yellow for the city's walls. The Bull is a pre-historic symbol of the region.</p></figcaption>

        </figure>
    </div><br>
</body>
